{% load email_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f5f5fe;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f5f5fe;padding:28px 16px;font-family:Arial,sans-serif;">
    <tr>
      <td align="center">
        <table width="700" cellpadding="0" cellspacing="0" border="0" style="max-width:700px;width:100%;">

          <!-- Header: logo -->
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <img src="{% absolute_static 'batid/email/rnb-logo.png' %}" alt="RNB" style="display:block;height:auto;max-width:200px;">
              <div style="font-size:20px;color:#000000;margin-top:16px;margin-bottom:10px;font-weight:bold;">Référentiel National des Bâtiments</div>
            </td>
          </tr>

          <!-- White content block -->
          <tr>
            <td style="background-color:#ffffff;padding:36px 48px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:16px;">
              <p style="font-size:11px;color:#999999;margin:0;">
                Pour tout renseignement, vous pouvez nous contacter par email :
                <a href="mailto:rnb@beta.gouv.fr" style="color:#2c50a0;text-decoration:none;">rnb@beta.gouv.fr</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
