name: tests

on:
  pull_request:
    branches: [the_import,main]

permissions:
  contents: read
  pull-requests: write

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python: [3.12]
    steps:
      - uses: actions/checkout@v3
      - name: Build & run docker
        run: docker compose -f docker-compose.test.yml up -d --build
      - name: Run static typing checks
        run: docker compose -f docker-compose.test.yml exec -T web mypy . --show-traceback
