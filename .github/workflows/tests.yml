name: tests

on:
  pull_request:
    branches: [the_import,main]

permissions:
  contents: read
  pull-requests: write

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python: [3.12]
    steps:
      - uses: actions/checkout@v3
      - name: Build & run docker
        run: docker compose -f docker-compose.test.yml up -d --build
      - name: Run static typing checks
        run: docker compose -f docker-compose.test.yml exec -T web mypy .
      - name: Run tests with coverage
        run: docker compose -f docker-compose.test.yml exec -T web coverage run --data-file=/tmp/.coverage manage.py test
      - name: Generate coverage report
        run: |
          docker compose -f docker-compose.test.yml exec -T web \
            coverage report --data-file=/tmp/.coverage --omit="*/tests/*,*/migrations/*" > coverage_report.txt
      - name: Post coverage comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('coverage_report.txt', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Coverage report\n\`\`\`\n${report}\n\`\`\``
            });
